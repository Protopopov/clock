    function draw() {
      const now = new Date();
      const h = now.getHours() % 12, m = now.getMinutes(), s = now.getSeconds();
      ctx.clearRect(0, 0, 400, 400);

      // Face
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.fillStyle = '#f5f0e8';
      ctx.fill();
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 8;
      ctx.stroke();

      // Hour markers
      for (let i = 0; i < 12; i++) {
        const angle = (i * Math.PI) / 6;
        const x1 = cx + (r - 20) * Math.sin(angle);
        const y1 = cy - (r - 20) * Math.cos(angle);
        const x2 = cx + (r - 35) * Math.sin(angle);
        const y2 = cy - (r - 35) * Math.cos(angle);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 4;
        ctx.stroke();
      }

      // Logo — centered in upper half of clock face
      if (logo.complete && logo.naturalWidth > 0) {
        const logoSize = 72;
        const logoX = cx - logoSize / 2;
        const logoY = cy + r * 0.52 - logoSize / 2;
        ctx.drawImage(logo, logoX, logoY, logoSize, logoSize);
      }

      // Hour hand
      const hAngle = ((h + m / 60) * Math.PI) / 6;
      drawHand(hAngle, r * 0.5, 8, '#000000');

      // Minute hand
      const mAngle = ((m + s / 60) * Math.PI) / 30;
      drawHand(mAngle, r * 0.75, 5, '#000000');

      // Second hand
      const sAngle = (s * Math.PI) / 30;
      drawHand(sAngle, r * 0.85, 2, '#C460F7');

      // Center dot
      ctx.beginPath();
      ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
      ctx.fillStyle = '#000000';
      ctx.fill();

      requestAnimationFrame(draw);
    }

    function drawHand(angle, length, width, color) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + length * Math.sin(angle), cy - length * Math.cos(angle));
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    logo.onload = draw;
    draw();
  </script>
